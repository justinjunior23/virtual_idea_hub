<style>
/* ── SHARED PARTIAL STYLES (injected into every partial) ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(104,211,145,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(104,211,145,0); }
}

/* topbar */
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
.page-title { font-family:'Syne',sans-serif; font-weight:800; font-size:32px; letter-spacing:-1px; background:linear-gradient(135deg,var(--text),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.page-sub   { font-size:12px; color:var(--muted2); margin-top:4px; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.time-badge   { font-size:11px; color:var(--muted2); background:var(--surface2); border:1px solid var(--border); padding:6px 14px; border-radius:20px; }
.status-dot   { width:8px; height:8px; background:var(--accent3); border-radius:50%; display:inline-block; margin-right:6px; animation:pulse-green 2s infinite; }

/* section titles */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.section-title  { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:var(--text); display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; width:3px; height:16px; background:var(--accent); border-radius:2px; }
.section-count  { font-size:10px; color:var(--muted2); background:var(--surface2); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }

/* cards / panels */
.p-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:24px; animation:fadeUp .4s ease both; }
.p-card-head { padding:16px 20px; border-bottom:1px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:space-between; }
.p-card-body { padding:20px; }

/* table */
.p-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:24px; animation:fadeUp .4s ease both; }
.p-table { width:100%; border-collapse:collapse; }
.p-table thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
.p-table th { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); padding:12px 18px; text-align:left; font-weight:500; }
.p-table td { padding:12px 18px; font-size:12px; border-bottom:1px solid rgba(99,179,237,.05); vertical-align:middle; }
.p-table tr:last-child td { border-bottom:none; }
.p-table tbody tr { transition:background .15s; }
.p-table tbody tr:hover { background:rgba(99,179,237,.04); }

/* badges */
.badge { font-size:10px; padding:3px 10px; border-radius:20px; font-weight:500; }
.badge.pending  { background:rgba(246,173,85,.12);  color:var(--accent2); }
.badge.resolved { background:rgba(104,211,145,.12); color:var(--accent3); }
.badge.review   { background:rgba(99,179,237,.12);  color:var(--accent);  }
.badge.rejected { background:rgba(252,129,129,.12); color:var(--accent4); }
.badge.emergency{ background:rgba(252,129,129,.18); color:var(--accent4); border:1px solid rgba(252,129,129,.3); }

/* stat row */
.stat-row { display:grid; gap:16px; margin-bottom:24px; }
.stat-row.cols-4 { grid-template-columns:repeat(4,1fr); }
.stat-row.cols-3 { grid-template-columns:repeat(3,1fr); }
.stat-row.cols-2 { grid-template-columns:repeat(2,1fr); }

.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 22px; position:relative; overflow:hidden; animation:fadeUp .4s ease both; }
.stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:14px 14px 0 0; }
.stat-box.blue::before   { background:linear-gradient(90deg,var(--accent),transparent); }
.stat-box.green::before  { background:linear-gradient(90deg,var(--accent3),transparent); }
.stat-box.orange::before { background:linear-gradient(90deg,var(--accent2),transparent); }
.stat-box.red::before    { background:linear-gradient(90deg,var(--accent4),transparent); }
.stat-box.purple::before { background:linear-gradient(90deg,var(--accent5),transparent); }

.stat-box-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); margin-bottom:10px; }
.stat-box-val   { font-family:'Syne',sans-serif; font-weight:800; font-size:36px; letter-spacing:-2px; line-height:1; }
.stat-box.blue .stat-box-val   { color:var(--accent); }
.stat-box.green .stat-box-val  { color:var(--accent3); }
.stat-box.orange .stat-box-val { color:var(--accent2); }
.stat-box.red .stat-box-val    { color:var(--accent4); }
.stat-box.purple .stat-box-val { color:var(--accent5); }
.stat-box-sub   { font-size:11px; color:var(--muted2); margin-top:8px; }

/* row items (submissions list) */
.sub-row { display:flex; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid rgba(99,179,237,.05); transition:background .15s; cursor:pointer; }
.sub-row:last-child { border-bottom:none; }
.sub-row:hover { background:rgba(99,179,237,.04); }
.sub-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.sub-info { flex:1; min-width:0; }
.sub-title { font-size:12px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sub-meta  { font-size:10px; color:var(--muted2); margin-top:2px; }
.sub-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }

/* empty state */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:12px; text-align:center; }
.empty-icon  { font-size:40px; opacity:.15; }
.empty-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; color:var(--text); }
.empty-desc  { font-size:11px; color:var(--muted2); max-width:280px; line-height:1.7; }

/* search / filter bar */
.filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filter-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:12px; font-family:'DM Mono',monospace; color:var(--text); outline:none; transition:border-color .2s; }
.filter-input:focus { border-color:var(--accent); }
.filter-select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:11px; font-family:'DM Mono',monospace; color:var(--muted2); outline:none; cursor:pointer; }
.filter-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:11px; font-family:'DM Mono',monospace; border:1px solid var(--border); background:var(--surface2); color:var(--muted2); cursor:pointer; transition:all .2s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:rgba(99,179,237,.1); border-color:rgba(99,179,237,.3); color:var(--accent); }

/* tag pill */
.tag-pill { font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:4px; font-weight:500; }

/* two-col layout */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
</style>
